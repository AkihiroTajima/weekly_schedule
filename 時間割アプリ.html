<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>週間時間割</title>
<style>
  :root {
    --bg: #f7f5f0;
    --paper: #fffdf8;
    --line: #d8d2c4;
    --ink: #3a3a3a;
    --accent: #5b7a9d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 24px 16px;
    background: var(--bg);
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
    color: var(--ink);
  }
  .container { max-width: 860px; margin: 0 auto; }
  h1 {
    font-size: 1.3rem;
    margin: 0 0 4px;
    letter-spacing: 0.1em;
  }
  .subtitle {
    font-size: 0.8rem;
    color: #888;
    margin-bottom: 16px;
  }
  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .toolbar button {
    padding: 6px 14px;
    border: 1px solid var(--line);
    background: var(--paper);
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    color: var(--ink);
  }
  .toolbar button:hover { background: #f0ece2; }
  .toolbar .danger { color: #a05050; }

  /* 項目管理パネル */
  .activity-panel {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 14px;
  }
  .activity-panel .panel-title {
    font-size: 0.8rem;
    color: #888;
    margin-bottom: 8px;
  }
  .activity-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 8px 4px 12px;
    border-radius: 14px;
    font-size: 0.85rem;
    border: 1px solid rgba(0,0,0,0.08);
  }
  .chip .remove {
    border: none;
    background: rgba(0,0,0,0.08);
    border-radius: 50%;
    width: 18px;
    height: 18px;
    line-height: 1;
    font-size: 0.7rem;
    cursor: pointer;
    color: #666;
    padding: 0;
  }
  .chip .remove:hover { background: rgba(0,0,0,0.18); }
  .activity-add {
    display: flex;
    gap: 6px;
  }
  .activity-add input {
    flex: 1;
    max-width: 240px;
    padding: 6px 10px;
    border: 1px solid var(--line);
    border-radius: 6px;
    font-size: 0.85rem;
    font-family: inherit;
    background: #fff;
  }
  .activity-add input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .activity-add button {
    padding: 6px 14px;
    border: 1px solid var(--line);
    background: var(--paper);
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    color: var(--ink);
  }
  .activity-add button:hover { background: #f0ece2; }

  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--paper);
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    border-radius: 8px;
    overflow: hidden;
    table-layout: fixed;
  }
  th, td {
    border: 1px solid var(--line);
    padding: 0;
    height: 48px;
    text-align: center;
    font-size: 0.9rem;
  }
  thead th {
    background: #ece7da;
    height: 38px;
    font-weight: 600;
    letter-spacing: 0.2em;
  }
  th.time-col {
    width: 64px;
    background: #ece7da;
    font-weight: 500;
    font-size: 0.8rem;
  }
  th.time-col input {
    width: 100%;
    height: 100%;
    border: none;
    background: transparent;
    text-align: center;
    font-size: 0.8rem;
    font-weight: 500;
    font-family: inherit;
    color: var(--ink);
    outline: none;
    padding: 2px;
  }
  th.time-col input:focus {
    box-shadow: inset 0 0 0 2px var(--accent);
    border-radius: 2px;
  }
  td select {
    width: 100%;
    height: 100%;
    border: none;
    background: transparent;
    font-size: 0.9rem;
    font-family: inherit;
    color: var(--ink);
    outline: none;
    cursor: pointer;
    text-align: center;
    text-align-last: center;
    -webkit-appearance: none;
    -moz-appearance: none;
    appearance: none;
    padding: 2px;
  }
  td select:focus {
    box-shadow: inset 0 0 0 2px var(--accent);
    border-radius: 2px;
  }
  .hint {
    margin-top: 10px;
    font-size: 0.75rem;
    color: #999;
  }
  .saved-note {
    display: inline-block;
    margin-left: 8px;
    font-size: 0.75rem;
    color: #6a9a6a;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .saved-note.show { opacity: 1; }
</style>
</head>
<body>
<div class="container">
  <h1>週間時間割</h1>
  <div class="subtitle">セルをクリックすると登録済みの項目から選べます。変更は自動で保存されます。</div>

  <div class="activity-panel">
    <div class="panel-title">項目リスト（セルで選択できるのはここにある項目だけ）</div>
    <div class="activity-chips" id="activityChips"></div>
    <div class="activity-add">
      <input type="text" id="newActivityInput" placeholder="新しい項目名（例: 筋トレ）" maxlength="20">
      <button id="addActivityBtn">＋ 項目を追加</button>
    </div>
  </div>

  <div class="toolbar">
    <button id="addRowBtn">＋ 時間帯を追加</button>
    <button id="resetBtn" class="danger">初期状態に戻す</button>
    <span class="saved-note" id="savedNote">保存しました</span>
  </div>
  <table id="timetable">
    <thead>
      <tr id="headerRow"><th class="time-col"></th></tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="hint">※ 同じ項目のセルは自動で同じ色になります。時間帯ラベルは直接編集できます。</div>
</div>

<script>
const DAYS = ["月", "火", "水", "木", "金"];
const STORAGE_KEY = "weekly-timetable-v2";

// todoリスト＋Salesforce受験計画に沿った初期データ（平日のみ／休日向きタスクは除外）
const DEFAULT_DATA = {
  rows: ["朝", "昼", "午後", "18", "19", "20", "21", "22", "23"],
  activities: ["10km走", "情報収集", "Salesforce", "模写", "AtCoder", "微積", "Rust", "お風呂"],
  cells: {
    "朝":  ["10km走", "", "10km走", "", "10km走"],
    "昼":  ["情報収集", "情報収集", "情報収集", "情報収集", "情報収集"],
    "午後": ["", "", "", "", ""],
    "18": ["Salesforce", "Salesforce", "Salesforce", "Salesforce", "Salesforce"],
    "19": ["Salesforce", "Salesforce", "Salesforce", "Salesforce", "Salesforce"],
    "20": ["お風呂", "お風呂", "お風呂", "お風呂", "お風呂"],
    "21": ["模写", "模写", "模写", "模写", "模写"],
    "22": ["AtCoder", "AtCoder", "AtCoder", "AtCoder", "Rust"],
    "23": ["", "微積", "", "微積", ""]
  }
};

// パステル系の色パレット（同じ項目 = 同じ色）
const PALETTE = [
  "#fde8e8", "#e8f3fd", "#e8fde9", "#fdf6e0", "#f3e8fd",
  "#e0f7f4", "#fdeaf6", "#eef2dd", "#ffe9d6", "#e3e9f7"
];

let data;

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      data = JSON.parse(raw);
      if (data && Array.isArray(data.rows) && data.cells) {
        // 旧バージョンのデータには項目リストがないので、セルの値から復元する
        if (!Array.isArray(data.activities)) {
          const found = new Set();
          for (const row of Object.values(data.cells)) {
            for (const v of row) {
              if (v && v.trim()) found.add(v.trim());
            }
          }
          data.activities = [...found];
        }
        return;
      }
    }
  } catch (e) {}
  data = JSON.parse(JSON.stringify(DEFAULT_DATA));
}

let saveTimer;
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  const note = document.getElementById("savedNote");
  note.classList.add("show");
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => note.classList.remove("show"), 1200);
}

function colorFor(text) {
  const t = (text || "").trim();
  if (!t) return "transparent";
  let hash = 0;
  for (let i = 0; i < t.length; i++) {
    hash = (hash * 31 + t.charCodeAt(i)) >>> 0;
  }
  return PALETTE[hash % PALETTE.length];
}

function renderActivities() {
  const chips = document.getElementById("activityChips");
  chips.innerHTML = "";
  if (data.activities.length === 0) {
    chips.innerHTML = '<span style="font-size:0.8rem;color:#aaa;">項目がまだありません</span>';
    return;
  }
  data.activities.forEach(name => {
    const chip = document.createElement("span");
    chip.className = "chip";
    chip.style.background = colorFor(name);
    const label = document.createElement("span");
    label.textContent = name;
    chip.appendChild(label);
    const removeBtn = document.createElement("button");
    removeBtn.className = "remove";
    removeBtn.textContent = "×";
    removeBtn.title = "この項目を削除";
    removeBtn.addEventListener("click", () => removeActivity(name));
    chip.appendChild(removeBtn);
    chips.appendChild(chip);
  });
}

function addActivity() {
  const input = document.getElementById("newActivityInput");
  const name = input.value.trim();
  if (!name) return;
  if (data.activities.includes(name)) {
    alert("同じ項目がすでにあります");
    return;
  }
  data.activities.push(name);
  input.value = "";
  input.focus();
  save();
  renderActivities();
  renderTable();
}

function removeActivity(name) {
  const usedCount = Object.values(data.cells)
    .reduce((n, row) => n + row.filter(v => v === name).length, 0);
  const msg = usedCount > 0
    ? `「${name}」は時間割の ${usedCount} か所で使われています。項目を削除すると、そのセルも空になります。削除しますか？`
    : `「${name}」を削除しますか？`;
  if (!confirm(msg)) return;
  data.activities = data.activities.filter(a => a !== name);
  for (const row of Object.values(data.cells)) {
    for (let i = 0; i < row.length; i++) {
      if (row[i] === name) row[i] = "";
    }
  }
  save();
  renderActivities();
  renderTable();
}

function renderTable() {
  const headerRow = document.getElementById("headerRow");
  headerRow.innerHTML = '<th class="time-col"></th>' +
    DAYS.map(d => `<th>${d}</th>`).join("");

  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  data.rows.forEach((rowLabel, ri) => {
    const tr = document.createElement("tr");

    const th = document.createElement("th");
    th.className = "time-col";
    const labelInput = document.createElement("input");
    labelInput.value = rowLabel;
    labelInput.addEventListener("change", () => {
      const newLabel = labelInput.value.trim() || rowLabel;
      if (newLabel !== rowLabel) {
        data.cells[newLabel] = data.cells[rowLabel] || ["", "", "", "", ""];
        delete data.cells[rowLabel];
        data.rows[ri] = newLabel;
      }
      save();
      renderTable();
    });
    th.appendChild(labelInput);
    tr.appendChild(th);

    if (!data.cells[rowLabel]) data.cells[rowLabel] = ["", "", "", "", ""];

    DAYS.forEach((_, di) => {
      const td = document.createElement("td");
      const select = document.createElement("select");

      const emptyOpt = document.createElement("option");
      emptyOpt.value = "";
      emptyOpt.textContent = "";
      select.appendChild(emptyOpt);

      const current = data.cells[rowLabel][di] || "";
      data.activities.forEach(name => {
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        select.appendChild(opt);
      });
      // 項目リストから消えた値がセルに残っている場合も表示できるようにする
      if (current && !data.activities.includes(current)) {
        const opt = document.createElement("option");
        opt.value = current;
        opt.textContent = current;
        select.appendChild(opt);
      }
      select.value = current;
      td.style.background = colorFor(current);

      select.addEventListener("change", () => {
        data.cells[rowLabel][di] = select.value;
        td.style.background = colorFor(select.value);
        save();
      });

      td.appendChild(select);
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
}

document.getElementById("addActivityBtn").addEventListener("click", addActivity);
document.getElementById("newActivityInput").addEventListener("keydown", e => {
  if (e.key === "Enter") addActivity();
});

document.getElementById("addRowBtn").addEventListener("click", () => {
  let label = prompt("時間帯のラベル（例: 24）", "");
  if (label === null) return;
  label = label.trim();
  if (!label) return;
  if (data.rows.includes(label)) {
    alert("同じラベルがすでにあります");
    return;
  }
  data.rows.push(label);
  data.cells[label] = ["", "", "", "", ""];
  save();
  renderTable();
});

document.getElementById("resetBtn").addEventListener("click", () => {
  if (!confirm("入力した内容を消して初期状態に戻しますか？")) return;
  data = JSON.parse(JSON.stringify(DEFAULT_DATA));
  save();
  renderActivities();
  renderTable();
});

load();
renderActivities();
renderTable();
</script>
</body>
</html>
